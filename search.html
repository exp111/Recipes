---
layout: page
title: Suche
---

<div>
  <input type="text" id="search-input" name="query" placeholder="Suche...">
  <ul id="search-results">

  </ul>
  <h2>Kategorien</h2>
  <ul>
    {% for tag in site.tags %}
    <li class="tags"> 
      <a href="{{ site.baseurl }}/{{ tag[0] }}">{{ tag[0] | replace: '-', ' ' | capitalize }} <span>({{ tag[1].size }})</span></a> 
    </li>
    {% endfor %}
  </ul> 
</div>

<script src="assets/js/search.js" type="text/javascript"></script>
<script>
SimpleJekyllSearch({
  searchInput: document.getElementById('search-input'),
  resultsContainer: document.getElementById('search-results'),
  json: '{{ site.baseurl }}/assets/search.json',
  searchResultTemplate: '<li><a href="{{ site.baseurl }}/{url}" title="{desc}">{title}</a></li>',
})
</script>
