---
layout: page
---
<style>
    .amount-group {
        --border-width: 1px;
        --border-radius: 0.375rem;
        display: flex;
    }
    .amount-group > * {
        padding: .375rem .75rem;
        border: var(--border-width) #495057 solid;
    }
    /* Remove border width to not have double width */
    .amount-group > :not(:first-child) {
        border-left-width: 0;
    }
    /* Stop ios from rounding input end */
    .amount-group .amount-input {
        border-radius: 0;
    }
    .amount-group button {
        cursor: pointer;
        font-family: monospace;
        font-weight: bold;
    }
    /* Style buttons */
    .amount-group .amount-plus {
        color: #DEE2E6;
        background-color: #198754;
    }
    .amount-group .amount-minus {
        color: #DEE2E6;
        background-color: #DC3545;
    }
    /* Make last/first child rounded */
    .amount-group :first-child {
        border-top-left-radius: var(--border-radius);
        border-bottom-left-radius: var(--border-radius);
    }
    .amount-group :last-child {
        border-top-right-radius: var(--border-radius);
        border-bottom-right-radius: var(--border-radius);
    }
</style>
<script>
    function adjustInput(id, value) {
        let el = document.getElementById(id);
        // change value
        el.value = Number(el.value) + value;
        // dispath change event
        el.dispatchEvent(new Event('change'));
    }
</script>
<label for="amount">Portionen:</label>
<div class="amount-group">
    <input type="number" class="amount-input" id="amount" value="{{ page.portions | default: 2 }}" min="1" onchange="updateZutaten()">
    <button class="amount-plus" onclick="adjustInput('amount', 1)">+</button>
    <button class="amount-minus" onclick="adjustInput('amount', -1)">-</button>
</div>

{{ content }}

{% if page.source %}
<a href="{{ page.source }}">Quelle</a>
{% endif %}

<script>
function updateZutaten() {
  const amount = parseFloat(document.getElementById("amount").value) ?? 1;
  const elements = document.querySelectorAll("span[base]");

  elements.forEach(el => {
    const base = parseFloat(el.getAttribute("base"));
    if (!base) {
      return;
    }
    el.textContent = (base * amount).toFixed(1).replace(/[.,]0$/, "");
  });
}
updateZutaten()
</script>
